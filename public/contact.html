<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Panther Technology Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/images/favicon.png">
    <link rel="shortcut icon" href="/images/favicon.png" type="image/png">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        panther: {
                            red: '#AD3A2B',
                            hover: '#8B2E22'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1a1a1a 0%, #333333 100%); }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <!-- Navigation (Copied from index.html for consistency) -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-24 items-center">
                <a href="/" class="flex items-center hover:opacity-90 transition">
                    <img src="/images/panther-logo.jpg" alt="Panther Logo" class="h-20 w-auto rounded-lg">
                    <span class="ml-4 text-2xl font-extrabold tracking-tight text-gray-900">Panther <span class="text-panther-red">Technology</span> Solutions</span>
                </a>
                <div class="hidden md:flex space-x-8">
                    <a href="/" class="text-gray-600 hover:text-panther-red font-semibold transition">Home</a>
                    <a href="/#services" class="text-gray-600 hover:text-panther-red font-semibold transition">Services</a>
                    <a href="https://blog.panthertechnologysolutions.com" class="text-gray-600 hover:text-panther-red font-semibold transition">Blog</a>
                    <a href="/contact.html" class="bg-panther-red text-white px-6 py-3 rounded-lg hover:bg-panther-hover transition font-bold shadow-md">Contact Us</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contact Form Section -->
    <section class="py-24 bg-gray-50">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 bg-white p-12 lg:p-16 rounded-3xl shadow-2xl border border-gray-100">
            <h2 class="text-3xl lg:text-4xl font-bold text-center text-gray-900 mb-8">Get in Touch</h2>
            <p class="text-center text-gray-600 mb-10">Have questions or need support? Fill out the form below and I'll get back to you as soon as possible.</p>

            <form id="contactForm" class="space-y-6">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                    <input type="text" name="name" id="name" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-panther-red focus:border-panther-red sm:text-sm">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" name="email" id="email" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-panther-red focus:border-panther-red sm:text-sm">
                </div>
                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
                    <input type="tel" name="phone" id="phone" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-panther-red focus:border-panther-red sm:text-sm">
                </div>
                <div>
                    <label for="message" class="block text-sm font-medium text-gray-700">Message</label>
                    <textarea name="message" id="message" rows="5" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-panther-red focus:border-panther-red sm:text-sm"></textarea>
                </div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-lg font-bold text-white bg-panther-red hover:bg-panther-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-panther-red transition-all hover:-translate-y-1">
                    Send Message
                </button>
                <div id="formStatus" class="mt-4 text-center text-sm font-medium"></div>
            </form>
        </div>
    </section>

    <!-- Footer (Copied from index.html for consistency) -->
    <footer class="bg-white py-12 border-t border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <a href="/" class="flex items-center hover:opacity-80 transition">
                <img src="/images/panther-logo.jpg" alt="Panther Logo" class="h-12 w-auto">
                <span class="ml-3 text-gray-500 font-bold">&copy; 2026 Panther Technology Solutions, LLC</span>
            </a>
            <div class="flex space-x-6 text-gray-400 text-sm items-center">
                <a href="#" class="hover:text-panther-red transition">Privacy Policy</a>
                <a href="#" class="hover:text-panther-red transition">Terms of Service</a>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const formStatus = document.getElementById('formStatus');
            formStatus.textContent = 'Sending message...';
            formStatus.className = 'mt-4 text-center text-sm font-medium text-gray-600';

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                message: document.getElementById('message').value
            };

            try {
                // This URL will point to your Firebase Function endpoint
                const response = await fetch('/api/sendEmail', { // Assuming /api/sendEmail is the endpoint for the Firebase Function
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    formStatus.textContent = 'Message sent successfully! I will get back to you shortly.';
                    formStatus.className = 'mt-4 text-center text-sm font-medium text-green-600';
                    document.getElementById('contactForm').reset();
                } else {
                    const errorData = await response.json();
                    formStatus.textContent = `Failed to send message: ${errorData.error || response.statusText}`;
                    formStatus.className = 'mt-4 text-center text-sm font-medium text-red-600';
                }
            } catch (error) {
                formStatus.textContent = `An error occurred: ${error.message}`;
                formStatus.className = 'mt-4 text-center text-sm font-medium text-red-600';
            }
        });
    </script>
</body>
</html>
